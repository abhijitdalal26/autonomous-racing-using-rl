behaviors:
  KartAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3           # Entropy bonus – encourages exploration
      epsilon: 0.2           # PPO clipping range
      lambd: 0.95            # GAE lambda
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 2_000_000      # Total env steps before training ends
    time_horizon: 64          # Steps collected per agent before an update
    summary_freq: 10_000      # How often (steps) to write TensorBoard stats
    keep_checkpoints: 5       # Number of .onnx snapshots to keep

    # --- Multi-agent speed-up ------------------------------------------
    # When you duplicate Kart_AI in the scene, all copies share this one
    # behavior definition and their experiences are pooled automatically.
    # -------------------------------------------------------------------

env_settings:
  timeout_wait: 180
